<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Earn | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            overflow-x: hidden; 
        }
        .app-container { 
            max-width: 480px; 
            margin: 0 auto; 
            min-height: 100vh; 
            background: linear-gradient(180deg, #0f172a 0%, #020617 100%); 
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        
        .custom-input {
            background-color: rgba(30, 41, 59, 0.7);
            border: 2px solid #334155;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }
        .custom-input:focus {
            border-color: #22c55e;
            background-color: rgba(30, 41, 59, 1);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }
        .btn-primary:active { transform: scale(0.96); }

        .info-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        #dashboard-page { display: none; }
        #withdraw-modal { display: none; }
        
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid #22c55e;
            width: 25px; height: 25px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .balance-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
        }

        /* চ্যালেঞ্জ বক্সের লাইভ স্টাইল */
        .task-box { border: 1px solid #334155; transition: all 0.3s ease; }
        .task-done { background: #22c55e !important; border-color: #22c55e !important; color: white !important; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="toast-container" class="fixed top-5 left-0 right-0 z-[100] flex flex-col items-center pointer-events-none"></div>

    <div class="app-container relative">
        
        <div id="login-page" class="min-h-screen flex flex-col justify-center px-8 py-10">
            <div class="flex justify-center mb-8">
                <div class="w-24 h-24 bg-gradient-to-br from-green-400 to-green-600 rounded-3xl flex items-center justify-center shadow-2xl">
                    <i class="fas fa-shield-alt text-5xl text-white"></i>
                </div>
            </div>
            <h1 class="text-4xl font-bold text-center mb-2 tracking-tight">Secure Earn</h1>
            <p class="text-gray-400 text-center text-lg mb-10">আপনার আয়ের নিরাপদ প্লাটফর্ম</p>

            <div class="info-card p-8 shadow-2xl border-white/5">
                <div class="mb-6">
                    <label class="block text-gray-300 text-sm font-bold mb-2 ml-1 uppercase tracking-wider">আপনার নাম</label>
                    <input type="text" id="nameInput" placeholder="এখানে নাম লিখুন..." class="custom-input w-full p-5 rounded-2xl text-white outline-none">
                </div>
                <div class="mb-8">
                    <label class="block text-gray-300 text-sm font-bold mb-2 ml-1 uppercase tracking-wider">ফোন নম্বর (UID)</label>
                    <input type="number" id="phoneInput" placeholder="এখানে নম্বর লিখুন..." class="custom-input w-full p-5 rounded-2xl text-white outline-none">
                </div>
                <button onclick="handleLogin()" id="loginBtn" class="btn-primary w-full py-5 rounded-2xl font-bold text-white text-xl flex items-center justify-center gap-3">
                    এগিয়ে যান <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <div id="dashboard-page" class="pb-10 min-h-screen flex flex-col">
            <div class="flex justify-between items-center px-6 py-6 bg-slate-900/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-40">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center text-green-500 border border-white/5"><i class="fas fa-user-circle text-2xl"></i></div>
                    <div>
                        <p class="text-[11px] text-gray-500 font-bold uppercase tracking-widest">ব্যবহারকারী</p>
                        <h2 class="text-lg font-bold text-white leading-tight" id="displayUserName">User</h2>
                        <p class="text-[11px] text-green-500 font-mono">ID: <span id="displayHeaderUid">...</span></p>
                    </div>
                </div>
                <button onclick="logout()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-power-off text-lg"></i></button>
            </div>

            <div class="px-6 mt-8 flex-grow">
                <div class="balance-card p-7 rounded-3xl mb-6 relative overflow-hidden shadow-xl">
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-gray-400 text-sm font-bold mb-1 uppercase tracking-wider">বর্তমান ব্যালেন্স</p>
                            <h1 class="text-5xl font-bold text-white tracking-tighter">৳ <span id="balanceDisplay">0</span></h1>
                        </div>
                        <button onclick="openWithdrawModal()" class="bg-green-500/10 hover:bg-green-500 border border-green-500/20 text-green-500 hover:text-white px-5 py-3 rounded-2xl text-sm font-bold transition-all">টাকা তুলুন</button>
                    </div>
                </div>

                <div class="info-card mb-8 overflow-hidden p-6">
                    <div class="flex items-center justify-center gap-2 mb-4">
                        <i class="fas fa-fire text-orange-500 text-xl"></i>
                        <h3 class="font-bold text-yellow-500 text-xl">আজকের চ্যালেঞ্জ</h3>
                    </div>
                    
                    <div class="bg-yellow-500/10 border border-yellow-500/30 text-yellow-500 text-center py-2 rounded-xl mb-6 text-xs font-bold">
                        ১০টি কাজ পূর্ণ করলে ২০% এক্সট্রা বোনাস!
                    </div>

                    <div id="challengeGrid" class="grid grid-cols-5 bg-slate-800/40 border-2 border-slate-700/50 rounded-xl overflow-hidden">
                        </div>
                    <p id="progressText" class="text-center text-[10px] text-gray-500 mt-3 font-bold uppercase tracking-widest">প্রগ্রেস: ০/১০</p>
                </div>

                <div class="info-card mb-8 overflow-hidden">
                    <div class="p-5 border-b border-white/5 bg-white/5 flex items-center gap-3">
                        <i class="fas fa-bolt text-yellow-400 text-lg"></i>
                        <h3 class="font-bold text-white text-md">অটোমেটিক কাজ শুরু করুন</h3>
                    </div>
                    <div class="p-6" id="verification-content-container"></div>
                </div>
            </div>
        </div>

        <div id="withdraw-modal" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center px-6 backdrop-blur-sm">
            <div class="info-card w-full max-w-sm rounded-3xl p-8 border-white/10 relative">
                <button onclick="closeWithdrawModal()" class="absolute top-5 right-5 text-gray-500 hover:text-white transition-colors"><i class="fas fa-times-circle text-2xl"></i></button>
                <h3 class="text-2xl font-bold text-white mb-1">টাকা উত্তোলন</h3>
                <p class="text-sm text-gray-400 mb-6">মিনিমাম ১৫০ টাকা</p>
                <div class="space-y-4">
                    <select id="wMethod" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 text-white outline-none"><option value="Bkash">বিকাশ</option><option value="Nagad">নগদ</option></select>
                    <input type="number" id="wNumber" placeholder="ফোন নম্বর" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 text-white outline-none">
                    <input type="number" id="wAmount" placeholder="পরিমাণ (৳)" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 text-white outline-none">
                    <button onclick="submitWithdraw()" id="wBtn" class="btn-primary w-full py-4 rounded-2xl font-bold text-white">রিকোয়েস্ট পাঠান</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxp0IFogr2Xf-i3t1VMQaWTSU3qwElvGzydhIGPrLDeQSG0vzX4cwpKJwEi5efU2z8/exec"; 
        const API_KEY = "Hakim2724Ruma"; 
        
        let globalUid = "", globalName = "", currentPrivateKey = "";

        window.onload = function() {
            const sn = localStorage.getItem('user_name'), su = localStorage.getItem('user_uid');
            if (sn && su) { globalName = sn; globalUid = su; showDashboard(); }
        };

        function handleLogin() {
            const n = document.getElementById('nameInput').value, p = document.getElementById('phoneInput').value;
            if (!n || !p) return showToast("তথ্য দিন!", "Error");
            localStorage.setItem('user_name', n); localStorage.setItem('user_uid', p);
            globalName = n; globalUid = p; showDashboard();
        }

        function showDashboard() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('dashboard-page').style.display = 'flex';
            document.getElementById('displayUserName').innerText = globalName;
            document.getElementById('displayHeaderUid').innerText = globalUid;
            loadBalance(); renderStep1();
        }

        function loadBalance() {
            fetch(SCRIPT_URL + `?action=getBalance&uid=${globalUid}&apiKey=${API_KEY}`)
            .then(res => res.json())
            .then(data => {
                if(data.result === 'success') {
                    document.getElementById('balanceDisplay').innerText = data.balance;
                    updateChallengeUI(data.todayTasks);
                }
            });
        }

        function updateChallengeUI(todayTasks) {
            const grid = document.getElementById('challengeGrid');
            grid.innerHTML = "";
            for(let i=1; i<=10; i++) {
                const box = document.createElement('div');
                box.className = `task-box border border-slate-700/50 h-16 flex items-center justify-center text-2xl font-bold ${i <= todayTasks ? 'task-done' : 'text-slate-300'}`;
                box.innerText = i;
                grid.appendChild(box);
            }
            document.getElementById('progressText').innerText = `প্রগ্রেস: ${todayTasks}/১০ সম্পন্ন`;
        }

        function renderStep1() {
            document.getElementById('verification-content-container').innerHTML = `
                <div class="bg-slate-800/50 p-5 rounded-2xl mb-6 border border-white/5 text-sm text-gray-300">
                    <p class="font-bold text-green-500 mb-2">প্রতি কাজ: ৪০ টাকা</p>
                    <p>লিংকে গিয়ে ফেস ভেরিফিকেশন সফল করে অ্যাপে স্ট্যাটাস চেক করুন।</p>
                </div>
                <button onclick="fetchLinkAndStart()" id="startBtn" class="btn-primary w-full py-5 rounded-2xl font-bold text-white text-lg">ভেরিফিকেশন শুরু করুন</button>
            `;
        }

        function fetchLinkAndStart() {
            const container = document.getElementById('verification-content-container');
            container.innerHTML = `<div class="flex flex-col items-center py-10 gap-3"><div class="loader"></div><p class="text-xs text-gray-500">লিংক লোড হচ্ছে...</p></div>`;
            fetch(SCRIPT_URL + `?action=getLink&uid=${globalUid}&name=${globalName}&apiKey=${API_KEY}`)
                .then(res => res.json()).then(data => {
                    if (data.result === "success") {
                        currentPrivateKey = data.privateKey;
                        container.innerHTML = `
                            <button onclick="window.open('${data.link}', '_blank')" class="w-full border-2 border-green-500 text-green-500 font-bold py-5 rounded-2xl mb-4">Verify Face Now</button>
                            <button onclick="checkStatus()" id="statusCheckBtn" class="w-full bg-slate-800 text-white font-bold py-5 rounded-2xl">ভেরিফিকেশন স্ট্যাটাস দেখুন</button>
                        `;
                    } else { showToast("লিংক নেই!", "Error"); renderStep1(); }
                });
        }

        async function checkStatus() {
            const btn = document.getElementById('statusCheckBtn');
            btn.innerHTML = `<div class="loader mx-auto"></div>`; btn.disabled = true;
            // সিমুলেটেড ভেরিফিকেশন (আপনার স্ক্রিপ্টের সাথে আপডেট হবে)
            setTimeout(() => {
                fetch(SCRIPT_URL + `?action=updateStatus&uid=${globalUid}&status=Verified&apiKey=${API_KEY}`)
                .then(() => {
                    showToast("সফল!", "Success");
                    loadBalance(); renderStep1();
                });
            }, 2000);
        }

        function openWithdrawModal() { document.getElementById('withdraw-modal').style.display = 'flex'; }
        function closeWithdrawModal() { document.getElementById('withdraw-modal').style.display = 'none'; }
        
        function submitWithdraw() {
            const amount = document.getElementById('wAmount').value;
            if(amount < 150) return showToast("মিনিমাম ১৫০ টাকা!", "Error");
            showToast("রিকোয়েস্ট পাঠানো হয়েছে!", "Success");
            closeWithdrawModal();
        }

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-2xl mb-3 text-white font-bold ${type === 'Error' ? 'bg-red-600' : 'bg-green-600'}`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
